main:
  push:
    - stages:
        - name: "Install Python Dependencies"
          image: python:3.11-slim
          script:
            - pip install --no-cache-dir -r ai-news-backend/requirements.txt
            - pip install --no-cache-dir apscheduler uvicorn gunicorn
        - name: "Build Frontend"
          image: node:18-alpine
          script:
            - cd ai-news-frontend && npm install --registry=https://registry.npmmirror.com && npm run build
        - name: "Seed Database"
          image: python:3.11-slim
          script:
            - cd ai-news-backend && python seed_deploy.py || true
        - name: "Run Application"
          image: python:3.11-slim
          script:
            - cd ai-news-backend && gunicorn -w 2 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:7860
          ports:
            - "7860"
          runner:
            cpus: 2
            memory: 2G