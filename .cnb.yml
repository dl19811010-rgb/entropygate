$:
  vscode:
    - runner:
        cpus: 2
        memory: 4G
      services:
        - vscode
      stages:
        - name: "Build frontend and admin"
          script:
            - echo "=== Installing Node.js ==="
            - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            - apt-get update && apt-get install -y nodejs
            - node --version
            - npm --version
            - echo "=== Building frontend ==="
            - cd /workspace/ai-news-frontend
            - npm install --registry=https://registry.npmmirror.com
            - npm run build
            - ls -la dist/index.html
            - echo "=== Building admin panel ==="
            - cd /workspace/ai-news-admin
            - npm install --registry=https://registry.npmmirror.com
            - npm run build
            - ls -la dist/index.html
            - echo "=== Frontend and admin build complete ==="
        - name: "Install backend dependencies and init DB"
          script:
            - echo "=== Ensuring Python3 and pip ==="
            - python3 --version
            - python3 -m ensurepip --upgrade || apt-get install -y python3-pip
            - python3 -m pip --version
            - echo "=== Installing Python dependencies ==="
            - cd /workspace/ai-news-backend
            - python3 -m pip install --no-cache-dir -r requirements.txt
            - python3 -m pip install --no-cache-dir apscheduler uvicorn gunicorn
            - echo "=== Initializing database ==="
            - python3 seed_complete.py
            - echo "=== Backend ready ==="
      endStages:
        - name: "Start application"
          script:
            - cd /workspace/ai-news-backend
            - exec python3 -m gunicorn -w 2 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:7860 --access-logfile - --error-logfile -
      ports:
        - "7860"
