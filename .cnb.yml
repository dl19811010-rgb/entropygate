$:
  vscode:
    - docker:
        build: ./Dockerfile.cnb
        runner:
          cpus: 2
          memory: 2G
        services:
          - vscode
        stages:
          - name: "Prepare environment"
            script:
              - echo "=== Preparing environment ==="
              - cd /workspace
              - pip install --no-cache-dir -r ai-news-backend/requirements.txt
              - pip install --no-cache-dir apscheduler uvicorn gunicorn
              - cd ai-news-backend && python seed_deploy.py || echo "DB init done"
              - echo "=== Environment ready ==="
        endStages:
          - name: "Start application"
            script:
              - cd /workspace && chmod +x start_app.sh && exec bash start_app.sh
        ports:
          - "7860"
