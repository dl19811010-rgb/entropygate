$:
  push:
    - runner:
        cpus: 2
        memory: 4G
      stages:
        - name: "Install dependencies and build"
          script:
            - echo "=== Installing Python ==="
            - apt-get update && apt-get install -y python3 python3-pip python3-venv
            - python3 --version
            - echo "=== Installing Node.js ==="
            - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            - apt-get install -y nodejs
            - node --version
            - echo "=== Building frontend ==="
            - cd /workspace/ai-news-frontend
            - npm install --registry=https://registry.npmmirror.com
            - npm run build
            - echo "[OK] Frontend built"
            - echo "=== Building admin ==="
            - cd /workspace/ai-news-admin
            - npm install --registry=https://registry.npmmirror.com
            - npm run build
            - echo "[OK] Admin built"
            - echo "=== Installing backend deps ==="
            - cd /workspace/ai-news-backend
            - python3 -m venv venv
            - venv/bin/pip install --no-cache-dir -r requirements.txt
            - venv/bin/pip install --no-cache-dir apscheduler uvicorn gunicorn
            - echo "[OK] Backend deps installed"
      endStages:
        - name: "Start platform"
          script:
            - bash /workspace/start_app.sh
      ports:
        - "7860"
  vscode:
    - runner:
        cpus: 2
        memory: 4G
      services:
        - vscode
      stages:
        - name: "Install dependencies and build"
          script:
            - echo "=== Installing Python ==="
            - apt-get update && apt-get install -y python3 python3-pip python3-venv
            - python3 --version
            - echo "=== Installing Node.js ==="
            - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            - apt-get install -y nodejs
            - node --version
            - echo "=== Building frontend ==="
            - cd /workspace/ai-news-frontend
            - npm install --registry=https://registry.npmmirror.com
            - npm run build
            - echo "[OK] Frontend built"
            - echo "=== Building admin ==="
            - cd /workspace/ai-news-admin
            - npm install --registry=https://registry.npmmirror.com
            - npm run build
            - echo "[OK] Admin built"
            - echo "=== Installing backend deps ==="
            - cd /workspace/ai-news-backend
            - python3 -m venv venv
            - venv/bin/pip install --no-cache-dir -r requirements.txt
            - venv/bin/pip install --no-cache-dir apscheduler uvicorn gunicorn
            - echo "[OK] Backend deps installed"
      endStages:
        - name: "Start platform"
          script:
            - bash /workspace/start_app.sh
      ports:
        - "7860"
