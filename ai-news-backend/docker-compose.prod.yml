# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ---- Application ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: entropygate-api
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - ./ainews.db:/app/ainews.db
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: entropygate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---- Celery Worker ----
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: entropygate-worker
    command: celery -A app.tasks.crawl_tasks worker --loglevel=info --concurrency=2
    env_file:
      - .env.production
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.crawl_tasks", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ---- Celery Beat (Scheduler) ----
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: entropygate-scheduler
    command: celery -A app.tasks.crawl_tasks beat --loglevel=info
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Nginx (Reverse Proxy) ----
  nginx:
    image: nginx:alpine
    container_name: entropygate-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---- Backup Service ----
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: entropygate-backup
    command: python -c "
import time, subprocess
while True:
    subprocess.run(['python', 'backup.py'])
    time.sleep(86400)
"
    env_file:
      - .env.production
    volumes:
      - ./ainews.db:/app/ainews.db:ro
      - ./backups:/app/backups
    restart: unless-stopped

volumes:
  redis_data:
