app = "entropygate"

[build]
  dockerfile = "Dockerfile"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

[mounts]
  source = "data"
  destination = "/data"

[env]
  SECRET_KEY = "change-me-in-production-please-use-a-long-random-string"
  CORS_ORIGINS = "*"
