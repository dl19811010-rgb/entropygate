name: Crawler Worker (US egress)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax & smoke check (fail fast)
        # Runs BEFORE the expensive Playwright/Chromium install so a broken
        # module fails the run in seconds instead of minutes.
        run: |
          python -m pip install --quiet httpx
          cd crawler-worker
          python -m py_compile *.py
          python -m unittest tests.test_smoke -v

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crawler-worker/requirements.txt

      - name: Install Playwright Chromium
        run: |
          # Chromium binary for the 4 Cloudflare-protected sources.
          playwright install --with-deps chromium

      - name: Run crawler
        env:
          STUDIO_BASE_URL: ${{ secrets.STUDIO_BASE_URL }}
          STUDIO_ADMIN_PASSWORD: ${{ secrets.STUDIO_ADMIN_PASSWORD }}
          GITHUB_PAT: ${{ secrets.PAT }}        # only for committing seen_urls / image_map
          # R2 image fallback (set R2_PUBLIC_BASE after enabling bucket public access)
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          R2_FORCE_UPLOAD: "0"   # full-mirror is now the default policy in image_host.upload_images
          # Phase-2 auto image search: Unsplash by default (Access Key set in
          # repo secrets). Wikimedia Commons is the keyless fallback if Unsplash
          # is rate-limited/empty. Set IMAGE_SEARCH_PROVIDER=pexels to use Pexels.
          # AUTO_IMAGE_SEARCH=0 disables the feature entirely.
          AUTO_IMAGE_SEARCH: "1"
          IMAGE_SEARCH_PROVIDER: "unsplash"
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          # 12 sources now (7 overseas + 5 domestic/zh). Balanced quota so EVERY
          # source gets coverage each run instead of only the first few: with
          # 12 sources x PER_SOURCE_CAP(7) = 84 = GLOBAL_CAP, all sources are
          # served. Previously GLOBAL_CAP=40 starved the trailing sources
          # (DeepMind / Google AI / Meta never ingested).
          PER_SOURCE_CAP: "7"
          GLOBAL_CAP: "84"
        run: |
          cd crawler-worker
          python worker.py

      - name: R2 self-test (force run only)
        if: env.R2_FORCE_UPLOAD == '1'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
        run: |
          cd crawler-worker
          python -c "from image_host import selftest; print('R2_SELFTEST_URL', selftest())"

      - name: Commit seen_urls + image map back
        if: always()
        run: |
          git config user.name "crawler-worker[bot]"
          git config user.email "bot@entropygate.cc"
          git remote set-url origin "https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git"
          git add crawler-worker/seen_urls.json
          [ -f crawler-worker/image_map.json ] && git add crawler-worker/image_map.json
          git diff --cached --quiet || git commit -m "chore: update crawler state [skip ci]"
          git push
        continue-on-error: true
