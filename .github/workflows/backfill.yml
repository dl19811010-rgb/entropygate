name: Backfill R2 images (US egress)

# One-shot job: re-host every existing article's cover image to R2 so that
# legacy articles (which the incremental crawler never re-mirrors) become
# China-reachable. Trigger manually from the Actions tab.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crawler-worker/requirements.txt

      - name: Run backfill
        env:
          STUDIO_BASE_URL: ${{ secrets.STUDIO_BASE_URL }}
          STUDIO_ADMIN_PASSWORD: ${{ secrets.STUDIO_ADMIN_PASSWORD }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
        run: |
          cd crawler-worker
          python backfill.py

      - name: Commit image map
        if: always()
        run: |
          git config user.name "crawler-worker[bot]"
          git config user.email "bot@entropygate.cc"
          git remote set-url origin "https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git"
          [ -f crawler-worker/image_map.json ] && git add crawler-worker/image_map.json
          git diff --cached --quiet || git commit -m "chore: update image map [skip ci]"
          git push
        continue-on-error: true
