name: Keep CNB Alive

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "CNB Keep-Alive Bot"
          git config --global user.email "bot@users.noreply.github.com"

      - name: Add CNB remote
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          git remote add cnb https://cnb:${CNB_TOKEN}@cnb.cool/entropygate.cc.cd/totoss.git || true
          git remote -v

      - name: Trigger CNB rebuild
        run: |
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          echo "Triggering CNB rebuild at $TIMESTAMP"

          git commit --allow-empty -m "chore: keep-alive - $TIMESTAMP"
          git push cnb main --force

          echo "CNB build triggered successfully!"
